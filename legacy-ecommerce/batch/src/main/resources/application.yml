spring:
  application:
    name: batch
  main:
    web-application-type: none
  datasource:
    # 이커머스 서비스와 '같은' shop DB 를 본다(공유DB, 스키마는 이커머스가 만듦). ecommerce 와 동일한
    # SHOP_DB_* 환경변수를 써 두 모듈이 같은 DB 를 가리킨다 — 공유 결합의 외부 주입 지점이며,
    # 향후 DB 분리(ADR-0002) 시 여기서 갈라진다(R5/ADR-0007).
    url: ${SHOP_DB_URL:jdbc:h2:file:~/legacyshopdb;AUTO_SERVER=TRUE}
    username: ${SHOP_DB_USERNAME:sa}
    password: ${SHOP_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
