server:
  port: 8082

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:file:~/legacypaydb;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
