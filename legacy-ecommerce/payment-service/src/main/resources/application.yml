server:
  port: 8082

spring:
  application:
    name: payment-service
  datasource:
    # 결제 전용 DB(독립) — 환경변수로 외부 주입, 미설정 시 로컬 파일 DB 기본값(R5/ADR-0007).
    url: ${PAYMENT_DB_URL:jdbc:h2:file:~/legacypaydb;AUTO_SERVER=TRUE}
    username: ${PAYMENT_DB_USERNAME:sa}
    password: ${PAYMENT_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
