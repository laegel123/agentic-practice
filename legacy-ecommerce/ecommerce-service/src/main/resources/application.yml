server:
  port: 8081

spring:
  application:
    name: ecommerce-service
  datasource:
    url: jdbc:h2:file:~/legacyshopdb;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# 결제 서비스 주소 (하드코딩된 기본값)
payment:
  base-url: http://localhost:8082
